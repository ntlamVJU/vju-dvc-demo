<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Case submitted · VJU Public Service Portal</title>
 <link rel="stylesheet" href="styles.css" />
 <link rel="stylesheet" href="tailwind.output.css" />
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb"><a href="index.html">Home</a><span class="sep">›</span><a href="my-requests.html">My Requests</a><span class="sep">›</span><span>Submitted</span></div>

 <div class="card" style="max-width: 640px; margin: 40px auto;"><div class="card-body" style="padding:32px; text-align:center;">
  <div style="width:64px; height:64px; border-radius:50%; background: var(--green-50); color: var(--green-700); display: grid; place-items: center; margin: 0 auto 16px;">
   <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1 style="margin:0 0 6px; font-size:22px; color: var(--slate-900);">Case submitted successfully</h1>
  <p class="muted" style="margin: 0 0 18px;">A new workflow request has been created. Reference code:</p>
  <div style="display: inline-block; padding: 10px 18px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 8px; font-family: ui-monospace, Consolas, monospace; font-size: 16px; font-weight: 700; color: var(--slate-900); margin-bottom: 18px;" id="ref-code">VJU-XX-2026-XXXXXX</div>
  <div class="hstack" style="justify-content: center;">
   <a class="btn btn-secondary" href="index.html#catalogue">Submit another</a>
   <a class="btn btn-primary" href="my-requests.html">Open My Requests</a>
  </div>
 </div></div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>
mountLayout("");
const params = new URLSearchParams(location.search);
const code = params.get("code") || "—";
document.getElementById("ref-code").textContent = code;
</script>
</body>
</html>
