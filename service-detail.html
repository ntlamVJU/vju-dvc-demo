<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Service detail · VJU Public Service Portal</title>
 <link rel="stylesheet" href="styles.css" />
 <link rel="stylesheet" href="tailwind.output.css" />
 <style>
  .flow-steps { display:flex; align-items:flex-start; flex-wrap:nowrap; gap:8px; padding-top:4px; }
  .flow-step { flex:0 0 auto; width:160px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:4px; padding:0 4px; }
  .flow-step .fs-circle { width:38px; height:38px; border-radius:50%; background:#fff; color: var(--slate-500); display:grid; place-items:center; font-family: "Times New Roman", serif; font-weight:800; font-size:16px; border:2px solid var(--slate-300); }
  .flow-step.current .fs-circle { background: var(--red-600); color:#fff; border-color: var(--red-600); box-shadow: 0 0 0 4px rgba(206,122,88,.15); }
  .flow-step .fs-name { font-size:12.5px; font-weight:700; color: var(--slate-900); margin-top:4px; }
  .flow-step .fs-actor { font-size:11px; color: var(--slate-600); }
  .flow-connector { flex:1 1 auto; min-width:24px; height:38px; display:flex; align-items:center; justify-content:center; }
  .flow-connector::before { content:""; flex:1; height:2px; background: repeating-linear-gradient(to right, var(--red-300, var(--red-500)) 0 6px, transparent 6px 10px); }
  .flow-connector::after { content:""; width:0; height:0; border-top:5px solid transparent; border-bottom:5px solid transparent; border-left:7px solid var(--red-500); margin-left:-1px; }
  @media (max-width: 720px) {
   .flow-steps { flex-wrap:wrap; }
   .flow-step { width: calc(50% - 4px); }
   .flow-connector { display:none; }
  }
 </style>
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb" id="bc"></div>
 <div id="root"></div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>
mountLayout("home");

const code = new URLSearchParams(location.search).get("code");
const s = code ? findService(code) : null;
const me = getCurrentUser();

if (!s || !canSeeService(s, me)) {
 document.getElementById("bc").innerHTML = `<a href="index.html">Home</a><span class="sep">›</span><span>Not found</span>`;
 document.getElementById("root").innerHTML = `<div class="card"><div class="card-body" style="text-align:center; padding:40px;"><p class="muted">Service not found or not accessible.</p><a class="btn btn-secondary btn-sm" href="index.html#catalogue">← Back to catalogue</a></div></div>`;
} else {
 document.title = s.name + " · VJU Public Service Portal";
 document.getElementById("bc").innerHTML = `<a href="index.html">Home</a><span class="sep">›</span><a href="index.html#catalogue">Services</a><span class="sep">›</span><span>${esc(s.name)}</span>`;
 renderService();
}

function dueHoursText(h) {
 if (h == null) return "—";
 if (h < 24) return h + "h";
 const d = Math.round(h / 8);
 return d + " business day" + (d===1?"":"s");
}

function renderService() {
 const canDeploy = canDeployService(s, me);
 const live = s.deployed;
 const cta = !live
  ? `<span class="btn btn-secondary btn-lg" style="opacity:.6;">Coming soon</span>`
  : (s.deployer_eligible
      ? (canDeploy
          ? `<a class="btn btn-primary btn-lg" href="deploy.html?code=${esc(s.code)}">Deploy to many</a>`
          : `<span class="btn btn-secondary btn-lg" style="opacity:.6;">Deployer only</span>`)
      : `<a class="btn btn-primary btn-lg" href="service-submit.html?code=${esc(s.code)}">Apply online</a>`);

 document.getElementById("root").innerHTML = `
  <div class="card" style="margin-bottom:14px;"><div class="card-body" style="padding:22px;">
   <div style="display:grid; grid-template-columns: 1fr auto; gap:18px; align-items:flex-start;">
    <div>
     <div class="hstack" style="gap:8px; margin-bottom:6px;">
      <span class="svc-code" style="font-size:12.5px;">${esc(s.code)}</span>
      ${live ? `<span style="display:inline-flex; align-items:center; gap:4px; font-size:11.5px; color: var(--green-700);"><span style="width:6px; height:6px; border-radius:50%; background: var(--green-500);"></span>Live</span>` : `<span style="font-size:11.5px; color: var(--slate-500);">Roadmap</span>`}
      ${s.internal ? `<span style="font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:999px; background: var(--violet-50); color: var(--violet-700); text-transform: uppercase; letter-spacing:.4px;">Internal</span>` : ""}
     </div>
     <h1 style="margin:4px 0 8px; font-size:22px; font-weight:800; color: var(--slate-900);">${esc(s.name)}</h1>
     <p class="muted" style="margin:0; font-size:14px; line-height:1.6;">${esc(s.desc)}</p>
     <div class="hstack" style="gap:18px; margin-top:12px; font-size:13px; flex-wrap:wrap;">
      <span>Expected deadline <strong>${esc(dueHoursText(s.due_hours))}</strong></span>
      <span>Handled by <strong>${esc(s.team)}</strong></span>
     </div>
    </div>
    <div class="vstack" style="gap:8px;">
     ${cta}
    </div>
   </div>
  </div></div>

  <div class="card" style="margin-bottom:14px;"><div class="card-body">
   <h3 style="margin:0 0 14px; color: var(--red-700);">Workflow steps</h3>
   <div class="flow-steps">${(s.steps || []).map((st, i, arr) => `
    <div class="flow-step ${st.current ? 'current' : ''}">
     <div class="fs-circle">${String(i+1).padStart(2,"0")}</div>
     <div class="fs-name">${esc(st.name)}</div>
     <div class="fs-actor">${esc(st.actor)}</div>
    </div>${i < arr.length - 1 ? '<div class="flow-connector" aria-hidden="true"></div>' : ''}`).join("")}</div>
  </div></div>

  ${(s.fields && s.fields.length) ? `<div class="card"><div class="card-body">
   <h3 style="margin:0 0 12px; color: var(--red-700);">Required information</h3>
   <ul style="margin:0; padding-left:18px; line-height:1.7;">
    ${s.fields.map(f => `<li>${esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</li>`).join("")}
   </ul>
  </div></div>` : ""}
 `;
}
</script>
</body>
</html>
