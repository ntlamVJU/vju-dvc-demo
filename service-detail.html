<!doctype html>
<html lang="vi">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Chi tiết thủ tục · Cổng DVC VJU</title>
 <link rel="stylesheet" href="styles.css" />
 <style>/* Tabs */
 .dvc-tabs { display:flex; gap:0; border-bottom: 2px solid var(--slate-200); margin: 22px 0 0; overflow-x:auto; }
 .dvc-tabs .tab {
 padding: 12px 18px; font-weight: 600; font-size: 13.5px;
 color: var(--slate-500); cursor: pointer; white-space: nowrap;
 border-bottom: 3px solid transparent; margin-bottom: -2px;
 display: inline-flex; align-items: center; gap: 8px;
 }
 .dvc-tabs .tab:hover { color: var(--slate-800); }
 .dvc-tabs .tab.active { color: var(--red-700); border-bottom-color: var(--red-700); }
 .dvc-tabs .tab .count { font-size:10.5px; background: var(--slate-100); color: var(--slate-600); padding: 1px 6px; border-radius:999px; }
 .tab-pane { padding: 22px 0; }
 .tab-pane.hidden { display:none; }

 /* Flow stepper visual on top */
 .flow-banner {
 background: linear-gradient(135deg, var(--red-50), #FFFAE8);
 border: 1px solid #F5C842; border-radius: var(--radius-lg);
 padding: 18px 22px; margin-top: 18px;
 }
 .flow-banner h3 { margin: 0 0 12px; font-size: 14px; color: var(--red-700); display:inline-flex; align-items:center; gap:8px; }
 .flow-steps { display: flex; gap: 0; align-items: center; flex-wrap: wrap; }
 .flow-step {
 flex: 1; min-width: 130px;
 display: flex; flex-direction: column; align-items: center; text-align: center; gap: 4px;
 position: relative; padding: 0 6px;
 }
 .flow-step .fs-circle {
 width: 38px; height: 38px; border-radius: 50%;
 background: #fff; color: var(--slate-500);
 display: grid; place-items: center;
 font-family: "Times New Roman", serif; font-weight: 800; font-size: 16px;
 border: 2px solid var(--slate-300);
 }
 .flow-step.current .fs-circle {
 background: var(--red-600); color:#fff; border-color: var(--red-600);
 box-shadow: 0 0 0 4px rgba(220,38,38,.15);
 }
 .flow-step .fs-name { font-size: 12.5px; font-weight: 700; color: var(--slate-900); margin-top: 4px; }
 .flow-step .fs-actor { font-size: 11px; color: var(--slate-600); }
 .flow-step .fs-dur { font-size: 11px; color: var(--red-700); font-weight: 600; }
 .flow-step + .flow-step::before {
 content: "→"; position: absolute; left: -10px; top: 16px;
 color: var(--red-500); font-size: 18px; font-weight: 700;
 }

 .doc-row {
 display:flex; align-items:center; gap:12px;
 padding: 12px 14px; border:1px solid var(--slate-200); border-radius: 8px;
 background: #fff; margin-bottom: 8px;
 }
 .doc-row.required { border-left: 3px solid var(--red-500); }
 .doc-row .doc-name { flex:1; font-weight:600; font-size:13.5px; }
 .doc-row .req-tag { font-size:11px; color: var(--red-700); font-weight:700; }</style>
</head>
<body>
<div id="site-shell"></div>

<main class="page" id="root">
 <div class="crumb" id="bc"></div>

 <!-- ───── Header thẻ thông tin chính ───── -->
 <div class="card" id="svc-header" style="margin-bottom: 14px;">
 <div class="card-body" style="padding: 22px;">
 <div style="display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: flex-start;">
 <div>
 <div class="hstack" style="gap:8px; margin-bottom:6px;">
 <span class="svc-code" id="d-code" style="font-size:12.5px;"></span>
 <span id="d-muc"></span>
 <span class="badge done" id="d-online"><span class="dot"></span>Trực tuyến</span>
 </div>
 <h1 style="margin: 4px 0 8px; font-size: 22px; font-weight: 800; color: var(--slate-900);" id="d-name"></h1>
 <p class="muted" id="d-desc" style="margin: 0; font-size: 14px; line-height: 1.6;"></p>
 <div class="hstack" style="gap: 18px; margin-top: 12px; font-size: 13px; flex-wrap: wrap;">
 <span> <strong id="d-sla"></strong></span>
 <span> <strong id="d-fee"></strong></span>
 <span> <strong id="d-agency"></strong></span>
 <span> <strong id="d-rating"></strong></span>
 </div>
 </div>
 <div class="vstack" style="gap: 8px;">
 <a id="d-submit-btn" class="btn btn-primary btn-lg" href="#">Đăng ký trực tuyến</a>
 <button class="btn btn-secondary">Tải biểu mẫu</button>
 <button class="btn btn-ghost btn-sm">Đánh dấu</button>
 </div>
 </div>
 </div>
 </div>

 <!-- ───── BANNER LUỒNG (trên đầu - đúng ý sếp Thọ) ───── -->
 <div class="flow-banner">
 <h3>TRÌNH TỰ THỰC HIỆN (Luồng tốt nhất)</h3>
 <div class="flow-steps" id="flow-steps"></div>
 <p style="margin: 12px 0 0; font-size: 12.5px; color: var(--slate-600);">Tổng thời gian giải quyết:<strong id="flow-total"></strong>· Bạn đang ở bước<strong>Chuẩn bị nộp hồ sơ</strong>
 </p>
 </div>

 <!-- ───── 6 mục chuẩn DVC theo Nghị định 42 ───── -->
 <div class="dvc-tabs" id="tabs">
 <div class="tab active" data-tab="overview">Mô tả chung</div>
 <div class="tab" data-tab="steps">Trình tự thực hiện</div>
 <div class="tab" data-tab="docs">Thành phần hồ sơ<span class="count" id="docs-count"></span></div>
 <div class="tab" data-tab="fee">Phí, lệ phí</div>
 <div class="tab" data-tab="legal">Cơ sở pháp lý</div>
 <div class="tab" data-tab="form">Mẫu đơn</div>
 </div>

 <div class="tab-pane" data-tab="overview" id="pane-overview"></div>
 <div class="tab-pane hidden" data-tab="steps" id="pane-steps"></div>
 <div class="tab-pane hidden" data-tab="docs" id="pane-docs"></div>
 <div class="tab-pane hidden" data-tab="fee" id="pane-fee"></div>
 <div class="tab-pane hidden" data-tab="legal" id="pane-legal"></div>
 <div class="tab-pane hidden" data-tab="form" id="pane-form"></div>

 <!-- ───── CTA cuối trang ───── -->
 <div style="text-align:center; padding: 28px; background: var(--gold-50); border: 1px dashed #E5A823; border-radius: var(--radius-lg);">
 <p style="margin: 0 0 12px; font-size: 14px;">Đã đọc xong các yêu cầu? Bắt đầu nộp hồ sơ ngay.</p>
 <a id="d-submit-btn-2" class="btn btn-primary btn-lg" href="#">ĐĂNG KÝ TRỰC TUYẾN</a>
 </div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>mountLayout("services");

const code = new URLSearchParams(location.search).get("code") || SERVICES[0].code;
const s = findService(code) || SERVICES[0];
const cat = findCategory(s.cat);

document.title = s.name + " · Cổng DVC VJU";

document.getElementById("bc").innerHTML = `<a href="index.html">Trang chủ</a> <span class="sep">›</span>
 <a href="services.html">Danh mục dịch vụ</a> <span class="sep">›</span>
 <a href="services.html?cat=${s.cat}">${esc(cat.name)}</a> <span class="sep">›</span>
 <span>${esc(s.name)}</span>`;

document.getElementById("d-code").textContent = s.code;
document.getElementById("d-muc").innerHTML = mucBadge(s.muc);
document.getElementById("d-name").textContent = s.name;
document.getElementById("d-desc").textContent = s.desc;
document.getElementById("d-sla").textContent = s.sla_days + " ngày làm việc";
document.getElementById("d-fee").textContent = feeText(s.fee);
document.getElementById("d-fee").className = s.fee === 0 ? "" : "";
document.getElementById("d-agency").textContent = s.agency;
document.getElementById("d-rating").textContent = s.rating + "/5 (" + s.reviews + " lượt)";

const submitHref = "service-submit.html?code=" + s.code;
document.getElementById("d-submit-btn").href = submitHref;
document.getElementById("d-submit-btn-2").href = submitHref;

// Flow banner
const totalDays = s.steps.reduce((acc, st) =>acc + (parseFloat((st.duration || "0").replace(",", ".")) || 0), 0);
document.getElementById("flow-total").textContent = totalDays >0 ? totalDays + " ngày làm việc" : s.sla_days + " ngày làm việc";
document.getElementById("flow-steps").innerHTML = s.steps.map((st, i) =>`<div class="flow-step ${st.current ? "current" : ""}">
 <div class="fs-circle">${String(i + 1).padStart(2, "0")}</div>
 <div class="fs-name">${esc(st.name)}</div>
 <div class="fs-actor">${esc(st.actor)}</div>${st.duration ? `<div class="fs-dur">${esc(st.duration)}</div>` : ""}</div>`).join("");

// Tab counts
document.getElementById("docs-count").textContent = s.docs.length;

// Tab panes
document.getElementById("pane-overview").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 10px; color: var(--red-700);">Mô tả</h3>
 <p style="margin: 0 0 14px; line-height: 1.7;">${esc(s.desc)}</p>
 <div class="grid-2" style="gap: 14px;">
 <div>
 <h4 style="margin: 0 0 6px; font-size: 13px; color: var(--slate-500); text-transform: uppercase; letter-spacing: .3px;">Đối tượng áp dụng</h4>
 <div>${audienceLabel(s.audience)} của Trường ĐH Việt Nhật</div>
 </div>
 <div>
 <h4 style="margin: 0 0 6px; font-size: 13px; color: var(--slate-500); text-transform: uppercase; letter-spacing: .3px;">Cơ quan thực hiện</h4>
 <div>${esc(s.agency)}</div>
 </div>
 <div>
 <h4 style="margin: 0 0 6px; font-size: 13px; color: var(--slate-500); text-transform: uppercase; letter-spacing: .3px;">Mức độ dịch vụ công</h4>
 <div>${mucBadge(s.muc)} ${s.muc === 4 ? "— nộp + thanh toán + nhận KQ online" : s.muc === 3 ? "— nộp online, nhận KQ tại quầy" : ""}</div>
 </div>
 <div>
 <h4 style="margin: 0 0 6px; font-size: 13px; color: var(--slate-500); text-transform: uppercase; letter-spacing: .3px;">Cách thức nộp</h4>
 <div>Trực tuyến qua Cổng DVC VJU · Trực tiếp tại Bộ phận Một cửa</div>
 </div>
 </div>
 </div></div>`;

document.getElementById("pane-steps").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 14px; color: var(--red-700);">Trình tự thực hiện</h3>
 <ol style="margin: 0; padding-left: 0; list-style: none;">${s.steps.map((st, i) =>`<li style="display: flex; gap: 14px; margin-bottom: 14px; padding: 14px; background: var(--slate-50); border-radius: 8px; border-left: 3px solid var(--red-500);">
 <div style="width: 36px; height: 36px; border-radius: 50%; background: var(--red-600); color: #fff; display: grid; place-items: center; font-weight: 800; flex-shrink: 0;">${i + 1}</div>
 <div>
 <div style="font-weight: 700; font-size: 14.5px;">${esc(st.name)}</div>
 <div class="muted" style="font-size: 12.5px; margin-top: 2px;">Người thực hiện:<strong style="color: var(--slate-700);">${esc(st.actor)}</strong>${st.duration ? ` · Thời gian:<strong style="color: var(--red-700);">${esc(st.duration)}</strong>` : ""}</div>
 </div>
 </li>`).join("")}</ol>
 </div></div>`;

document.getElementById("pane-docs").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 6px; color: var(--red-700);">Thành phần hồ sơ</h3>
 <p class="muted" style="margin: 0 0 14px; font-size: 13px;">Các giấy tờ cần chuẩn bị trước khi nộp hồ sơ.</p>${s.docs.map((d, i) =>`<div class="doc-row ${d.required ? "required" : ""}">
 <div style="font-size: 20px;"></div>
 <div class="doc-name">${i + 1}. ${esc(d.name)}
 ${d.required ? `<span class="req-tag" style="margin-left: 8px;">BẮT BUỘC</span>` : `<span class="muted" style="margin-left: 8px; font-size: 11.5px;">(Tuỳ chọn)</span>`}</div>${d.has_template ? `<button class="btn btn-secondary btn-sm">Tải mẫu</button>` : ""}</div>`).join("")}</div></div>`;

document.getElementById("pane-fee").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 14px; color: var(--red-700);">Phí, lệ phí</h3>
 <div style="text-align: center; padding: 28px; background: ${s.fee === 0 ? "var(--green-50)" : "var(--amber-50)"}; border-radius: 8px;">
 <div style="font-size: 32px; font-weight: 800; color: ${s.fee === 0 ? "var(--green-700)" : "var(--amber-700)"};">${feeText(s.fee)}</div>${s.fee === 0 ? `<p class="muted" style="margin: 8px 0 0;">Dịch vụ này được miễn phí cho ${audienceLabel(s.audience).toLowerCase()} của trường.</p>`
 : `<p class="muted" style="margin: 8px 0 0;">Lệ phí thu theo Quy định thu chi tài chính VJU 2025.<br/>Hỗ trợ thanh toán: VNPay, MoMo, Chuyển khoản ngân hàng.</p>`}</div>
 </div></div>`;

document.getElementById("pane-legal").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 14px; color: var(--red-700);">Cơ sở pháp lý</h3>
 <div style="padding: 14px; background: var(--slate-50); border-left: 3px solid var(--red-500); border-radius: 6px;">
 <div style="display: flex; gap: 12px; align-items: flex-start;">
 <div style="font-size: 24px;"></div>
 <div>
 <div style="font-weight: 700; font-size: 14px;">${esc(s.legal)}</div>
 <div class="muted" style="font-size: 12.5px; margin-top: 4px;">Văn bản pháp lý hiện đang có hiệu lực thi hành.</div>
 <div style="margin-top: 10px;">
 <button class="btn btn-secondary btn-sm">Xem toàn văn</button>
 <button class="btn btn-ghost btn-sm">Tải PDF</button>
 </div>
 </div>
 </div>
 </div>
 </div></div>`;

document.getElementById("pane-form").innerHTML = `<div class="card"><div class="card-body">
 <h3 style="margin: 0 0 6px; color: var(--red-700);">Mẫu đơn / Biểu mẫu</h3>
 <p class="muted" style="margin: 0 0 14px; font-size: 13px;">Các biểu mẫu liên quan đến thủ tục này.</p>${s.docs.filter(d =>d.has_template).map(d =>`<div class="doc-row">
 <div style="font-size: 20px;"></div>
 <div class="doc-name">${esc(d.name)}</div>
 <button class="btn btn-secondary btn-sm">.DOCX</button>
 <button class="btn btn-secondary btn-sm">.PDF</button>
 </div>`).join("") || `<p class="muted" style="text-align:center;">Thủ tục này không có biểu mẫu kèm theo.</p>`}</div></div>`;

// Tabs switching
const tabs = document.querySelectorAll(".dvc-tabs .tab");
const panes = document.querySelectorAll(".tab-pane");
tabs.forEach(t =>t.addEventListener("click", () =>{
 tabs.forEach(x =>x.classList.remove("active"));
 t.classList.add("active");
 panes.forEach(p =>p.classList.toggle("hidden", p.dataset.tab !== t.dataset.tab));
}));</script>
</body>
</html>
