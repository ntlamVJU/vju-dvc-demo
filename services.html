<!doctype html>
<html lang="vi">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Danh mục dịch vụ công · Cổng DVC VJU</title>
 <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb"><a href="index.html">Trang chủ</a> <span class="sep">›</span> <span>Danh mục dịch vụ công</span></div>

 <div class="section-head" style="margin-bottom: 18px;">
 <div>
 <h2>Danh mục dịch vụ công trực tuyến</h2>
 <p id="result-count">— dịch vụ phù hợp</p>
 </div>
 <a href="lookup.html" class="btn btn-secondary btn-sm">Tra cứu hồ sơ</a>
 </div>

 <!-- Filter bar -->
 <div class="card" style="margin-bottom: 18px;">
 <div class="card-body" style="padding: 14px 18px; display:grid; grid-template-columns: 200px 160px 140px 1fr; gap: 10px;">
 <div>
 <label style="font-size:11.5px; color:var(--slate-500); font-weight:600;">Lĩnh vực</label>
 <select class="select" id="f-cat"><option value="">Tất cả lĩnh vực</option></select>
 </div>
 <div>
 <label style="font-size:11.5px; color:var(--slate-500); font-weight:600;">Đối tượng</label>
 <select class="select" id="f-aud">
 <option value="">Tất cả</option>
 <option value="sv">Sinh viên</option>
 <option value="cb">Cán bộ</option>
 </select>
 </div>
 <div>
 <label style="font-size:11.5px; color:var(--slate-500); font-weight:600;">Mức độ DVC</label>
 <select class="select" id="f-muc">
 <option value="">Tất cả</option>
 <option value="4">Mức 4 (Toàn trình)</option>
 <option value="3">Mức 3 (Một phần)</option>
 <option value="2">Mức 2</option>
 </select>
 </div>
 <div>
 <label style="font-size:11.5px; color:var(--slate-500); font-weight:600;">Tìm theo tên / mã thủ tục</label>
 <input class="input" type="text" id="f-q" placeholder="vd: xác nhận sinh viên, TT-VJU-HV-01..." />
 </div>
 </div>
 </div>

 <div id="grouped"></div>

 <div id="empty" class="card hidden" style="margin-top: 18px;">
 <div class="card-body" style="text-align:center; padding: 40px;">
 <p class="muted">Không tìm thấy dịch vụ phù hợp với bộ lọc.</p>
 </div>
 </div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>mountLayout("services");

const fCat   = document.getElementById("f-cat");
const fAud   = document.getElementById("f-aud");
const fMuc   = document.getElementById("f-muc");
const fQ     = document.getElementById("f-q");
const grouped= document.getElementById("grouped");
const empty  = document.getElementById("empty");
const cnt    = document.getElementById("result-count");

// populate category select (no icons)
fCat.innerHTML = '<option value="">Tất cả lĩnh vực</option>' +
 CATEGORIES.map(c => `<option value="${c.id}">${c.name} (${audienceLabel(c.audience)})</option>`).join("");

// pre-select from URL
const params = new URLSearchParams(location.search);
if (params.get("cat")) fCat.value = params.get("cat");
if (params.get("aud")) fAud.value = params.get("aud");

function renderCard(s) {
  const live = s.deployed;
  const status = live
    ? `<div style="display:flex; align-items:center; gap:8px; padding: 4px 0; font-size:11.5px; color: var(--green-700);">
         <span style="display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--green-500);"></span>
         Đang chạy thật · BPMN <code style="font-size:11px;">${esc(s.bpmn || "")}</code>
       </div>`
    : `<div style="display:flex; align-items:center; gap:8px; padding: 4px 0; font-size:11.5px; color: var(--slate-500);">
         <span style="display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--slate-400);"></span>
         Trong lộ trình triển khai
       </div>`;
  const cta = live
    ? `<span class="btn btn-primary btn-sm" style="flex:1; justify-content:center;">Đăng ký</span>`
    : `<span class="btn btn-secondary btn-sm" style="flex:1; justify-content:center; opacity:.6;">Sắp ra mắt</span>`;
  return `
    <a class="svc-card" href="service-detail.html?code=${s.code}" style="${live ? '' : 'opacity:.78;'}">
      <div class="svc-head">
        <span class="svc-code">${s.code}</span>
        ${mucBadge(s.muc)}
      </div>
      <div class="svc-name">${esc(s.name)}</div>
      <div class="svc-desc">${esc(s.desc)}</div>
      <div class="svc-meta">
        <div class="k">Thời hạn</div><div class="v">${s.sla_days} ngày làm việc</div>
        <div class="k">Phí</div><div class="v ${s.fee === 0 ? "free" : ""}">${feeText(s.fee)}</div>
        <div class="k">Cơ quan</div><div class="v">${esc(s.agency)}</div>
        <div class="k">Đánh giá</div><div class="svc-rating"><strong>${s.rating}</strong>/5 · ${s.reviews} lượt</div>
      </div>
      ${status}
      <div class="svc-actions">
        <span class="btn btn-secondary btn-sm" style="flex:1; justify-content:center;">Xem chi tiết</span>
        ${cta}
      </div>
    </a>`;
}

function render() {
  const cat = fCat.value, aud = fAud.value, muc = fMuc.value;
  const q = fQ.value.trim().toLowerCase();
  const matches = SERVICES.filter(s => {
    if (cat && s.cat !== cat) return false;
    if (aud && s.audience !== aud && s.audience !== "all") return false;
    if (muc && String(s.muc) !== muc) return false;
    if (q && !(s.name + " " + s.code + " " + s.desc).toLowerCase().includes(q)) return false;
    return true;
  });

  const dep = matches.filter(s => s.deployed).length;
  const road = matches.length - dep;
  cnt.innerHTML = `<strong>${dep}</strong> đang triển khai · <strong>${road}</strong> trong lộ trình`;
  empty.classList.toggle("hidden", matches.length > 0);

  // Group by category — show each category as a section
  const byCat = {};
  matches.forEach(s => { (byCat[s.cat] = byCat[s.cat] || []).push(s); });

  // Sort within each category: deployed first
  Object.values(byCat).forEach(arr =>
    arr.sort((a, b) => (b.deployed === true) - (a.deployed === true) || b.used_30d - a.used_30d)
  );

  // Render sections in CATEGORIES order (so layout is stable)
  grouped.innerHTML = CATEGORIES
    .filter(c => byCat[c.id]?.length)
    .map(c => {
      const items = byCat[c.id];
      const liveCnt = items.filter(s => s.deployed).length;
      const tag = liveCnt > 0
        ? `<span style="font-size:11.5px; color: var(--green-700); font-weight:600; padding: 2px 8px; background: var(--green-50); border-radius: 999px;">${liveCnt}/${items.length} đang chạy</span>`
        : `<span style="font-size:11.5px; color: var(--slate-500); padding: 2px 8px; background: var(--slate-100); border-radius: 999px;">Lộ trình</span>`;
      return `
        <div class="cat-section" style="margin-bottom: 28px;">
          <div style="display:flex; align-items:baseline; gap:10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--brand-red);">
            <h3 style="margin: 0; font-size: 16px; font-weight: 700; color: var(--slate-900);">${esc(c.name)}</h3>
            <span style="color: var(--slate-500); font-size: 12.5px;">${audienceLabel(c.audience)}</span>
            <span style="flex:1;"></span>
            ${tag}
          </div>
          <div class="svc-grid">${items.map(renderCard).join("")}</div>
        </div>`;
    }).join("");
}

[fCat, fAud, fMuc].forEach(el => el.addEventListener("change", render));
fQ.addEventListener("input", render);
render();</script>
</body>
</html>
