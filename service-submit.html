<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Submit case · VJU Public Service Portal</title>
 <link rel="stylesheet" href="styles.css" />
 <link rel="stylesheet" href="tailwind.output.css" />
 <style>
  .submit-grid { display:grid; grid-template-columns: 1fr 280px; gap:18px; align-items:flex-start; }
  @media (max-width: 1000px) { .submit-grid { grid-template-columns: 1fr; } }
  .submit-side { background:#fff; border:1px solid var(--slate-200); border-radius:8px; padding:16px; position:sticky; top:22px; }
  .submit-side h4 { margin:0 0 10px; font-size:11.5px; color: var(--slate-500); text-transform: uppercase; letter-spacing:.3px; font-weight:700; }
 </style>
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb" id="bc"></div>
 <div id="root"></div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>
mountAuthLayout("");

const code = new URLSearchParams(location.search).get("code");
const s = code ? findService(code) : null;
const me = getCurrentUser();

if (!s) {
 document.getElementById("bc").innerHTML = `<a href="index.html">Home</a><span class="sep">›</span><span>Not found</span>`;
 document.getElementById("root").innerHTML = `<div class="card"><div class="card-body" style="text-align:center; padding:40px;"><p class="muted">Service not found.</p><a class="btn btn-secondary btn-sm" href="index.html#catalogue">← Back</a></div></div>`;
} else {
 document.title = "Apply: " + s.name;
 document.getElementById("bc").innerHTML = `<a href="index.html">Home</a><span class="sep">›</span><a href="service-detail.html?code=${esc(s.code)}">${esc(s.name)}</a><span class="sep">›</span><span>Apply</span>`;
 renderForm();
}

function dueHoursText(h) {
 if (h == null) return "—";
 if (h < 24) return h + "h";
 const d = Math.round(h / 8);
 return d + " business day" + (d===1?"":"s");
}

function renderForm() {
 const fields = s.fields || [];
 const formHtml = fields.length ? fields.map(f => {
  const req = f.required ? '<span class="req">*</span>' : '';
  if (f.type === "textarea") return `<div class="form-row"><label>${esc(f.label)} ${req}</label><textarea class="textarea" id="f-${f.key}"></textarea></div>`;
  if (f.type === "select")   return `<div class="form-row"><label>${esc(f.label)} ${req}</label><select class="select" id="f-${f.key}"><option value="">— Select —</option>${(f.options||[]).map(o=>`<option>${esc(o)}</option>`).join("")}</select></div>`;
  return `<div class="form-row"><label>${esc(f.label)} ${req}</label><input class="input" type="text" id="f-${f.key}" /></div>`;
 }).join("") : `<p class="muted">No form fields defined.</p>`;

 document.getElementById("root").innerHTML = `
  <div class="dvclt-banner" style="margin-bottom:18px;">
   <h1>APPLY: ${esc(s.name.toUpperCase())}</h1>
   <div class="sub">Service code <strong style="color: var(--red-700); font-family: ui-monospace, Consolas, monospace;">${esc(s.code)}</strong> · ${esc(s.team)} · Expected deadline ${esc(dueHoursText(s.due_hours))}</div>
  </div>
  <div class="submit-grid">
   <div>
    <div class="card"><div class="card-body" style="padding:20px;">
     <h3 style="margin:0 0 12px;">Application form</h3>
     ${formHtml}
     <div class="hstack" style="margin-top:18px; justify-content:flex-end;">
      <a class="btn btn-secondary" href="service-detail.html?code=${esc(s.code)}">Cancel</a>
      <button class="btn btn-primary" onclick="submitForm()">Submit case</button>
     </div>
    </div></div>
   </div>
   <aside class="submit-side">
    <h4>Summary</h4>
    <div style="font-size:13px; line-height:1.7;">
     <div><strong>Service</strong><br/>${esc(s.code)}</div>
     <div style="margin-top:10px;"><strong>Handled by</strong><br/>${esc(s.team)}</div>
     <div style="margin-top:10px;"><strong>Deadline</strong><br/>${esc(dueHoursText(s.due_hours))}</div>
     <div style="margin-top:10px;"><strong>Requester</strong><br/>${esc(me ? me.name : "—")}</div>
    </div>
   </aside>
  </div>
 `;
}

function submitForm() {
 const data = {};
 (s.fields || []).forEach(f => {
  const el = document.getElementById("f-" + f.key);
  if (el) data[f.label] = el.value;
  if (f.required && el && !el.value.trim()) {
   toast(`Missing required field: ${f.label}`, "error");
   el.focus();
   throw new Error("missing");
  }
 });
 const newCode = "VJU-" + (s.code.split("-")[1] || "GEN") + "-2026-" + String(Math.floor(Math.random()*99999)).padStart(6, "0");
 sessionStorage.setItem("dvc-demo:last-submission", JSON.stringify({ code: newCode, service: s.code, data }));
 location.href = "submit-success.html?code=" + newCode;
}
</script>
</body>
</html>
