<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Contact Directory · VJU Public Service Portal</title>
 <link rel="stylesheet" href="styles.css" />
 <link rel="stylesheet" href="tailwind.output.css" />
 <style>
  /* Mirrors VJU Hub ContactDirectory/Index.tsx — print-friendly contact list */
  .dir-doc {
   background:#fff; border:1px solid var(--slate-200); border-radius: 12px;
   padding: 22px; color: #111; box-shadow: var(--shadow-sm);
  }
  .dir-head { text-align:center; margin-bottom: 18px; }
  .dir-head img { width: 56px; height:56px; margin: 0 auto 8px; display:block; border-radius: 50%; }
  .dir-head h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
  .dir-search-wrap {
   background:#fff; border:1px solid var(--slate-200); border-radius: 10px;
   margin-bottom: 12px; position: relative;
  }
  .dir-search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color: var(--slate-400); }
  .dir-search-wrap input {
   width:100%; padding:11px 14px 11px 40px; border:0; background:transparent;
   font-size:14px; outline:none;
  }
  .dir-section { margin-bottom: 22px; }
  .dir-section h2 {
   margin: 0 0 10px; font-size: 14px; font-weight: 800; color: #111;
   text-transform: uppercase; letter-spacing: .3px;
  }
  .dir-dept { margin-bottom: 14px; }
  .dir-dept-head {
   border: 1px solid #b9c8df; background: #e7eef7;
   padding: 6px 10px; text-align: center;
   font-size: 13px; font-weight: 700; color: #111;
   text-transform: uppercase; letter-spacing: .3px;
  }
  .dir-dept-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .dir-dept-table {
   width: 100%; border-collapse: collapse; font-size: 12.5px; color: #111;
  }
  .dir-dept-table th, .dir-dept-table td {
   border: 1px solid #b9c8df; padding: 6px 8px;
  }
  .dir-dept-table th {
   background: #f0f4fa; font-weight: 700; font-size: 12px; text-align: center;
   text-transform: uppercase; letter-spacing: .3px;
  }
  .dir-dept-table td.no  { width: 6%;  text-align: center; }
  .dir-dept-table td.nm  { width: 22%; }
  .dir-dept-table td.pos { width: 46%; font-style: italic; color: var(--slate-700); }
  .dir-dept-table td.rm  { width: 12%; text-align: center; }
  .dir-dept-table td.dob { width: 14%; text-align: center; font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; }
  .dir-name { font-weight: 700; }
  .dir-email { font-size: 11px; color: var(--red-700); display: block; }
  .dir-mobile { font-size: 11px; color: var(--slate-600); display: block; }
  .dir-empty {
   background:#fff; border: 1px dashed var(--slate-300); border-radius: 10px;
   padding: 32px; text-align: center; color: var(--slate-500);
  }
  @media (max-width: 720px) {
   .dir-doc { padding: 14px; }
   .dir-dept-table td.pos { font-size: 12px; }
   .dir-dept-table th, .dir-dept-table td { padding: 5px 6px; }
  }
  @media (max-width: 480px) {
   .dir-dept-table { font-size: 11.5px; }
  }
 </style>
</head>
<body>
<div id="site-shell"></div>
<main class="page">
 <div class="crumb"><a href="index.html">Home</a><span class="sep">›</span><span>Contact Directory</span></div>
 <div class="hstack" style="justify-content:space-between; margin-bottom: 14px;">
  <div>
   <h1 style="margin: 0 0 4px; font-size: 22px;">Contact directory</h1>
   <p class="muted" style="margin: 0; font-size: 13px;">Search for contacts by name, email, phone number, or department.</p>
  </div>
  <button class="btn btn-secondary btn-sm" onclick="toast('Export — demo only')">
   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
   Export PDF
  </button>
 </div>

 <div class="dir-search-wrap">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input id="dir-q" type="text" placeholder="Search by name, email, phone, or department…" />
 </div>

 <div id="dir-root"></div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>
mountAuthLayout("directory");

function normalize(v) {
 return (v || "").toString().toLowerCase()
  .normalize("NFD").replace(/[̀-ͯ]/g, "")
  .replace(/đ/g, "d");
}

function filterDirectory(term) {
 const t = normalize(term.trim());
 if (!t) return DIRECTORY.sections;
 const result = [];
 for (const section of DIRECTORY.sections) {
  const sectionMatch = normalize(section.label_en).includes(t) || normalize(section.label_vi).includes(t);
  const depts = [];
  for (const dept of section.departments) {
   const deptMatch = normalize(dept.name_en).includes(t) || normalize(dept.name_vi || "").includes(t);
   const employees = (sectionMatch || deptMatch) ? dept.employees : dept.employees.filter(e => {
    const hay = [e.display_name, e.position, e.mobile || "", e.room, dept.name_en, dept.name_vi || "", ...(e.emails || [])]
     .map(normalize).join("  ");
    return hay.includes(t);
   });
   if (employees.length) depts.push({ ...dept, employees });
  }
  if (depts.length) result.push({ ...section, departments: depts });
 }
 return result;
}

function render() {
 const sections = filterDirectory(document.getElementById("dir-q").value);
 const host = document.getElementById("dir-root");
 if (!sections.length) {
  host.innerHTML = `<div class="dir-empty">
   <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:8px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
   <h3 style="margin:0 0 4px; font-size:15px; color: var(--slate-700);">No contacts found</h3>
   <p style="margin:0; font-size:13px;">Try a different keyword or check spelling.</p>
  </div>`;
  return;
 }
 host.innerHTML = `<div class="dir-doc">
  <div class="dir-head"><img src="logo.png" alt="VJU"/><h1>${esc(DIRECTORY.title)}</h1></div>
  ${sections.map(renderSection).join("")}
 </div>`;
}

function renderSection(s) {
 return `<div class="dir-section">
  <h2>${esc(s.roman)}. ${esc(s.label_en)}${s.label_vi ? ` — ${esc(s.label_vi)}` : ""}</h2>
  ${s.departments.map(renderDept).join("")}
 </div>`;
}
function renderDept(d) {
 return `<div class="dir-dept">
  <div class="dir-dept-head">${esc(d.name_en)}${d.name_vi ? ` (${esc(d.name_vi)})` : ""}</div>
  <div class="dir-dept-table-wrap">
   <table class="dir-dept-table">
    <thead><tr><th>No.</th><th>Name</th><th style="text-align:left;">Position · Contact</th><th>Room</th><th>D.O.B</th></tr></thead>
    <tbody>${d.employees.map(renderEmployee).join("")}</tbody>
   </table>
  </div>
 </div>`;
}
function renderEmployee(e) {
 return `<tr>
  <td class="no">${e.no}</td>
  <td class="nm"><span class="dir-name">${esc(e.display_name)}</span></td>
  <td class="pos">
   ${esc(e.position)}
   ${(e.emails || []).map(em => `<span class="dir-email">${esc(em)}</span>`).join("")}
   ${e.mobile ? `<span class="dir-mobile">${esc(e.mobile)}</span>` : ""}
  </td>
  <td class="rm">${esc(e.room || "—")}</td>
  <td class="dob">${esc(e.dob || "—")}</td>
 </tr>`;
}

document.getElementById("dir-q").addEventListener("input", render);
render();
</script>
</body>
</html>
