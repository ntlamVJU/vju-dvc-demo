<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>My Requests · VJU Public Service Portal</title>
 <link rel="stylesheet" href="styles.css" />
 <link rel="stylesheet" href="tailwind.output.css" />
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb"><a href="index.html">Home</a><span class="sep">›</span><span>My Requests</span></div>

 <div class="hstack" style="margin-bottom: 18px; justify-content: space-between;">
  <h1 style="margin: 0; font-size: 22px; color: var(--slate-900);">My Requests</h1>
  <div class="hstack">
   <a class="btn btn-secondary btn-sm" href="reports.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Reports
   </a>
   <a class="btn btn-primary btn-sm" href="index.html#catalogue">+ New case</a>
  </div>
 </div>

 <div class="req-tabs" id="req-tabs"></div>

 <div class="req-toolbar">
  <div class="req-search">
   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
   <input id="req-q" type="text" placeholder="Search by code, requester, or summary…" />
  </div>
  <div class="req-chips" id="req-chips"></div>
 </div>

 <div class="req-list" id="req-list"></div>
 <p id="req-empty" class="muted hidden" style="text-align:center; padding: 28px;">No cases match the current filters.</p>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>
mountAuthLayout("my-requests");

let activeTab = "submitted";
let activeStatus = "all";
let query = "";

const TABS = [
  { id: "submitted", label: "Submitted by me",   getData: () => SUBMITTED },
  { id: "inbox",     label: "Assigned to me",    getData: () => INBOX },
];
const STATUSES = [
  { id: "all",        label: "All" },
  { id: "processing", label: "In progress" },
  { id: "late",       label: "Overdue" },
  { id: "done",       label: "Completed" },
];

function renderTabs() {
 document.getElementById("req-tabs").innerHTML = TABS.map(t =>
  `<button class="req-tab ${t.id === activeTab ? 'active' : ''}" onclick="setTab('${t.id}')">${esc(t.label)} <span class="count">${t.getData().length}</span></button>`
 ).join("");
}
function renderChips() {
 document.getElementById("req-chips").innerHTML = STATUSES.map(s =>
  `<button class="req-chip ${s.id === activeStatus ? 'active' : ''}" onclick="setStatus('${s.id}')">${esc(s.label)}</button>`
 ).join("");
}
function renderList() {
 const data = TABS.find(t => t.id === activeTab).getData();
 const qq = query.toLowerCase();
 const list = data.filter(r => {
  if (activeStatus !== "all" && r.status !== activeStatus) return false;
  if (qq) {
   const hay = (r.code + " " + r.requester.name + " " + (r.summary || "")).toLowerCase();
   if (!hay.includes(qq)) return false;
  }
  return true;
 });
 const host = document.getElementById("req-list");
 const empty = document.getElementById("req-empty");
 empty.classList.toggle("hidden", list.length > 0);
 host.innerHTML = list.map(r => {
  const due = new Date(r.due_at);
  const daysLeft = Math.ceil((due - new Date()) / 86400000);
  const dueText = daysLeft < 0 ? `Overdue by ${-daysLeft} day${-daysLeft===1?"":"s"}`
                 : daysLeft === 0 ? "Due today"
                 : `${daysLeft} day${daysLeft===1?"":"s"} left`;
  const isLate = r.status === "late";
  return `<a class="req-row" data-status="${r.status}" href="case-detail.html?code=${r.code}">
   <span class="req-status"></span>
   <div class="req-body">
    <div class="req-code">${esc(r.code)}</div>
    <div class="req-title">${esc(r.summary || r.service.name)}</div>
    <div class="req-meta">${esc(r.service.code)} · ${esc(r.service.name)} · ${esc(r.requester.name)}</div>
   </div>
   <div class="req-due ${isLate ? 'is-late' : ''}">${esc(statusLabel(r.status))}<br/><strong>${esc(dueText)}</strong></div>
  </a>`;
 }).join("");
}
function setTab(id)    { activeTab = id;    renderTabs(); renderList(); }
function setStatus(id) { activeStatus = id; renderChips(); renderList(); }

document.getElementById("req-q").addEventListener("input", e => { query = e.target.value; renderList(); });

renderTabs();
renderChips();
renderList();
</script>
</body>
</html>
