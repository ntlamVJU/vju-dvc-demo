<!doctype html>
<html lang="vi">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>Tra cứu hồ sơ · Cổng DVC VJU</title>
 <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-shell"></div>

<main class="page">
 <div class="crumb"><a href="index.html">Trang chủ</a> <span class="sep">›</span> <span>Tra cứu hồ sơ</span></div>

 <!-- ───── Lookup hero ───── -->
 <div class="lookup-card">
 <h2>TRA CỨU TIẾN ĐỘ HỒ SƠ</h2>
 <p>Nhập mã hồ sơ trên phiếu hẹn để tra cứu trạng thái xử lý<br/>
 <strong style="color: #FFE082;">Không cần đăng nhập</strong></p>
 <form class="lookup-form" onsubmit="event.preventDefault(); doLookup()">
 <input id="q" type="text" placeholder="VD: DVC-2026-001234" autocomplete="off" />
 <button>Tra cứu</button>
 </form>
 <p style="margin: 14px 0 0; font-size: 12.5px; opacity: .85;">Gợi ý mã hợp lệ để thử:<a href="#" onclick="event.preventDefault(); document.getElementById('q').value='DVC-2026-001234'; doLookup()" style="color: #FFE082; font-family:ui-monospace,Consolas,monospace;">DVC-2026-001234</a>·<a href="#" onclick="event.preventDefault(); document.getElementById('q').value='DVC-2026-001198'; doLookup()" style="color: #FFE082; font-family:ui-monospace,Consolas,monospace;">DVC-2026-001198</a>·<a href="#" onclick="event.preventDefault(); document.getElementById('q').value='DVC-2026-001150'; doLookup()" style="color: #FFE082; font-family:ui-monospace,Consolas,monospace;">DVC-2026-001150</a>
 </p>
 </div>

 <!-- ───── Result ───── -->
 <div id="result" class="mt-3"></div>
</main>

<script src="layout.js"></script>
<script src="data.js"></script>
<script>mountLayout("lookup");

// Auto-fill from ?code=...
const pcode = new URLSearchParams(location.search).get("code");
if (pcode) { document.getElementById("q").value = pcode; doLookup(); }

function doLookup() {
 const q = document.getElementById("q").value.trim();
 const r = SUBMITTED.find(x =>x.code.toLowerCase() === q.toLowerCase());
 const host = document.getElementById("result");

 if (!q) { host.innerHTML = ""; return; }

 if (!r) {
 host.innerHTML = `<div class="card" style="border-color: var(--red-200);">
 <div class="card-body" style="display:flex; gap:14px; align-items:center;">
 <div style="font-size:36px;"></div>
 <div>
 <div style="font-weight: 700; color: var(--red-700); font-size: 15px;">Không tìm thấy hồ sơ với mã "<span style="font-family: ui-monospace, Consolas, monospace;">${esc(q)}</span>"</div>
 <div class="muted" style="font-size: 13px; margin-top: 4px;">Vui lòng kiểm tra lại mã hoặc liên hệ Bộ phận Một cửa:<strong>024.7300.0000</strong></div>
 </div>
 </div>
 </div>`;
 return;
 }

 host.innerHTML = renderResult(r);
}

function renderResult(r) {
 const s = r.service;
 const stepsCount = s.steps.length;
 const currentStep = r.current_step;

 return `<div class="card">
 <div class="card-header" style="background: ${r.status === "done" ? "var(--green-50)" : r.status === "late" ? "var(--red-50)" : "var(--amber-50)"};">
 <div>
 <div class="hstack" style="gap:8px;">
 <h3 class="card-title">${esc(r.code)}</h3>${statusBadge(r.status)}</div>
 <div class="muted" style="font-size: 12.5px; margin-top: 2px;">${esc(s.name)} · ${esc(s.code)}</div>
 </div>
 <div style="text-align: right;">
 <div class="muted" style="font-size: 11.5px;">Ngày tiếp nhận</div>
 <div style="font-weight: 600; font-size: 13px;">${fmtDateTime(r.submitted_at)}</div>
 <div class="muted" style="font-size: 11.5px; margin-top: 6px;">Ngày hẹn trả</div>
 <div style="font-weight: 700; font-size: 13px; color: ${r.status === "late" ? "var(--red-700)" : "var(--slate-900)"};">${fmtDateTime(r.due_at)}</div>
 </div>
 </div>

 <div class="card-body">
 <!-- Stepper -->
 <div class="stepper-h" style="margin: 0 0 18px;">${s.steps.map((st, i) =>`<div class="step ${i< currentStep ? "done" : (i === currentStep ? "active" : "")}">
 <div class="step-circle">${i + 1}</div>
 <div class="step-label">${esc(st.name)}</div>
 <div class="step-date">${i< currentStep ? "" : (i === currentStep ? " Đang xử lý" : "")}</div>
 </div>`).join("")}</div>

 <!-- Timeline -->
 <h4 style="margin: 14px 0 10px; font-size: 14px; color: var(--red-700);">Lịch sử xử lý</h4>
 <div style="border: 1px solid var(--slate-200); border-radius: 8px; overflow: hidden;">${r.timeline.map(t =>`<div style="display: flex; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--slate-100); background: ${t.current ? "var(--amber-50)" : "#fff"};">
 <div style="font-size: 20px;">${t.done ? "" : t.current ? "" : ""}</div>
 <div style="flex: 1;">
 <div style="font-weight: 600; font-size: 13.5px;">${esc(t.label)}</div>
 <div class="muted" style="font-size: 12px; margin-top: 2px;">${fmtDateTime(t.t)} · ${esc(t.actor)}</div>${t.note ? `<div style="font-size: 12.5px; margin-top: 4px; padding: 6px 10px; background: var(--slate-50); border-left: 2px solid var(--blue-500); border-radius: 4px;">${esc(t.note)}</div>` : ""}</div>
 </div>`).join("")}</div>

 <!-- Người nộp -->
 <h4 style="margin: 18px 0 10px; font-size: 14px; color: var(--red-700);">Thông tin người nộp</h4>
 <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; font-size: 13px; padding: 12px; background: var(--slate-50); border-radius: 8px;">
 <div><span class="muted">Họ tên:</span> <strong>${esc(r.requester.name)}</strong></div>
 <div><span class="muted">Mã:</span> <strong>${esc(r.requester.id)}</strong></div>
 </div>${r.status === "done" && r.rating ? `<h4 style="margin: 18px 0 10px; font-size: 14px; color: var(--red-700);">Đánh giá của người nộp</h4>
 <div style="font-size: 22px;">${"".repeat(r.rating)}${"".repeat(5 - r.rating)}<span style="font-size:14px; color: var(--slate-600);">${r.rating}/5</span></div>` : ""}

 ${r.status === "done" && !r.rating ? `<div style="margin-top: 18px; padding: 14px; background: var(--gold-50); border: 1px dashed #E5A823; border-radius: 8px; text-align: center;">
 <p style="margin: 0 0 8px;">Hồ sơ đã hoàn tất. Vui lòng đánh giá chất lượng phục vụ của chúng tôi!</p>
 <a class="btn btn-primary btn-sm" href="rate.html?code=${r.code}">Đánh giá ngay</a>
 </div>` : ""}</div>
 </div>`;
}</script>
</body>
</html>
